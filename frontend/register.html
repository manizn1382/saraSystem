<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ثبت‌نام دانشجو در سراسیستم</title>

  <!-- Bootstrap RTL -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
    rel="stylesheet"
  />
  <link href="../assets/css/sarasystem.css" rel="stylesheet" />

  <!-- HTMX + JSON encoder extension -->
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js" defer></script>
  <script src="../assets/js/auth.js" defer></script>
  <script src="../assets/js/api.js" defer></script>
  <script src="../assets/js/ui-helpers.js" defer></script>
  <script src="../assets/js/validation.js" defer></script>

  <!-- Alpine.js -->
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <style>
    [x-cloak] {
      display: none !important;
    }

    :root {
      --ss-primary: #08254a;
      --ss-primary-soft: #0d6efd;
      --ss-card-radius: 1.25rem;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 88% 8%, rgba(56, 189, 248, .22), transparent 28rem),
        radial-gradient(circle at 7% 96%, rgba(20, 184, 166, .22), transparent 30rem),
        radial-gradient(circle at 48% 28%, rgba(99, 102, 241, .09), transparent 26rem),
        linear-gradient(135deg, #06162b 0%, #071b35 48%, #08254a 100%);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .auth-card {
      width: 100%;
      max-width: 760px;
      border: 0;
      border-radius: var(--ss-card-radius);
      box-shadow: 0 1.25rem 3rem rgba(0, 0, 0, .28);
      background: rgba(248, 250, 252, .94);
      backdrop-filter: blur(10px);
    }

    .brand-logo {
      max-width: 280px;
      width: 100%;
      height: auto;
    }

    .btn-sarasystem {
      --bs-btn-bg: var(--ss-primary);
      --bs-btn-border-color: var(--ss-primary);
      --bs-btn-hover-bg: #0b3569;
      --bs-btn-hover-border-color: #0b3569;
      --bs-btn-active-bg: #061b36;
      --bs-btn-active-border-color: #061b36;
      --bs-btn-color: #fff;
      --bs-btn-hover-color: #fff;
      --bs-btn-active-color: #fff;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--ss-primary-soft);
      box-shadow: 0 0 0 .25rem rgba(13, 110, 253, .15);
    }

    .password-control {
      padding-left: 4.75rem;
    }

    .password-toggle {
      position: absolute;
      top: 50%;
      left: .65rem;
      transform: translateY(-50%);
      z-index: 5;
      border: 0;
      border-radius: 999px;
      background: #eef3f8;
      color: #475569;
      font-size: .85rem;
      font-weight: 600;
      line-height: 1;
      padding: .45rem .75rem;
      transition: background-color .2s ease, color .2s ease, box-shadow .2s ease;
    }

    .password-toggle:hover {
      background: #dbeafe;
      color: #0d6efd;
    }

    .password-toggle:focus-visible {
      outline: 0;
      box-shadow: 0 0 0 .2rem rgba(13, 110, 253, .2);
    }

    .password-control.is-invalid {
      background-position: left calc(4.75rem + .1875rem) center;
    }

    .auth-note {
      background: rgba(13, 110, 253, .08);
      border: 1px solid rgba(13, 110, 253, .14);
      border-radius: 1rem;
    }
  </style>
</head>

<body x-data="registerPage()">
  <main class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
    <section class="card auth-card" aria-labelledby="registerTitle">
      <div class="card-body p-4 p-md-5">
        <header class="text-center mb-4">
          <img
            src="../assets/logo_with_outline.png"
            alt="نشان سراسیستم"
            class="brand-logo mb-3"
          />

          <h1 id="registerTitle" class="h4 fw-bold text-primary-emphasis mb-2">
            ثبت‌نام دانشجو
          </h1>

          <p class="text-secondary mb-0">
            ایجاد حساب کاربری برای استفاده از خدمات خوابگاه
          </p>
        </header>

        <div class="auth-note p-3 mb-4 small text-primary-emphasis">
          این فرم مخصوص ثبت‌نام دانشجویان است. حساب‌های مسئول خوابگاه، مدیر سیستم و واحد پشتیبانی توسط مدیر سامانه ایجاد می‌شوند.
        </div>

        <div
          x-cloak
          x-show="alert.message"
          x-transition
          class="alert mb-4"
          :class="alert.type === 'success' ? 'alert-success' : 'alert-danger'"
          role="alert"
          aria-live="polite"
        >
          <span x-text="alert.message"></span>
        </div>

        <form
          id="registerForm"
          novalidate
          hx-ext="json-enc"
          hx-post="/api/auth/register/"
          hx-trigger="submit"
          hx-swap="none"
          hx-timeout="15000"
          hx-headers='{"Accept": "application/json"}'
          @submit.capture="validateBeforeSubmit($event)"
        >
          <input type="hidden" name="role" value="student" />

          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label for="firstName" class="form-label fw-semibold">
                نام
              </label>
              <input
                x-model.trim="form.first_name"
                :class="{ 'is-invalid': errors.first_name }"
                type="text"
                class="form-control form-control-lg"
                id="firstName"
                name="first_name"
                autocomplete="given-name"
                required
                aria-describedby="firstNameError"
                placeholder="نام"
              />
              <div id="firstNameError" class="invalid-feedback" x-text="errors.first_name"></div>
            </div>

            <div class="col-12 col-md-6">
              <label for="lastName" class="form-label fw-semibold">
                نام خانوادگی
              </label>
              <input
                x-model.trim="form.last_name"
                :class="{ 'is-invalid': errors.last_name }"
                type="text"
                class="form-control form-control-lg"
                id="lastName"
                name="last_name"
                autocomplete="family-name"
                required
                aria-describedby="lastNameError"
                placeholder="نام خانوادگی"
              />
              <div id="lastNameError" class="invalid-feedback" x-text="errors.last_name"></div>
            </div>

            <div class="col-12 col-md-6">
              <label for="nationalId" class="form-label fw-semibold">
                کد ملی
              </label>
              <input
                x-model.trim="form.national_id"
                :class="{ 'is-invalid': errors.national_id }"
                type="text"
                class="form-control form-control-lg"
                id="nationalId"
                name="national_id"
                inputmode="numeric"
                autocomplete="off"
                required
                aria-describedby="nationalIdError"
                placeholder="مثلاً ۰۰۱۲۳۴۵۶۷۸"
              />
              <div id="nationalIdError" class="invalid-feedback" x-text="errors.national_id"></div>
            </div>

            <div class="col-12 col-md-6">
              <label for="studentId" class="form-label fw-semibold">
                شماره دانشجویی
              </label>
              <input
                x-model.trim="form.student_id"
                :class="{ 'is-invalid': errors.student_id }"
                type="text"
                class="form-control form-control-lg"
                id="studentId"
                name="student_id"
                inputmode="numeric"
                autocomplete="off"
                required
                aria-describedby="studentIdError"
                placeholder="شماره دانشجویی"
              />
              <div id="studentIdError" class="invalid-feedback" x-text="errors.student_id"></div>
            </div>

            <div class="col-12 col-md-6">
              <label for="phone" class="form-label fw-semibold">
                شماره تماس
              </label>
              <input
                x-model.trim="form.phone"
                :class="{ 'is-invalid': errors.phone }"
                type="tel"
                class="form-control form-control-lg"
                id="phone"
                name="phone"
                inputmode="tel"
                autocomplete="tel"
                required
                aria-describedby="phoneError"
                placeholder="مثلاً ۰۹۱۲۳۴۵۶۷۸۹"
              />
              <div id="phoneError" class="invalid-feedback" x-text="errors.phone"></div>
            </div>

            <div class="col-12 col-md-6">
              <label for="gender" class="form-label fw-semibold">
                جنسیت
              </label>
              <select
                x-model="form.gender"
                :class="{ 'is-invalid': errors.gender }"
                class="form-select form-select-lg"
                id="gender"
                name="gender"
                required
                aria-describedby="genderError"
              >
                <option value="">انتخاب کنید</option>
                <option value="male">مرد</option>
                <option value="female">زن</option>
              </select>
              <div id="genderError" class="invalid-feedback" x-text="errors.gender"></div>
            </div>

            <div class="col-12">
              <label for="email" class="form-label fw-semibold">
                ایمیل
              </label>
              <input
                x-model.trim="form.email"
                :class="{ 'is-invalid': errors.email }"
                type="email"
                class="form-control form-control-lg"
                id="email"
                name="email"
                inputmode="email"
                autocomplete="email"
                required
                aria-describedby="emailError"
                placeholder="example@university.ac.ir"
                dir="ltr"
              />
              <div id="emailError" class="invalid-feedback" x-text="errors.email"></div>
            </div>

            <div class="col-12 col-md-6">
              <label for="password" class="form-label fw-semibold">
                رمز ورود
              </label>

              <div class="position-relative">
                <input
                  x-model="form.password"
                  :class="{ 'is-invalid': errors.password }"
                  :type="showPassword ? 'text' : 'password'"
                  class="form-control form-control-lg password-control"
                  id="password"
                  name="password"
                  autocomplete="new-password"
                  required
                  aria-describedby="passwordError"
                  placeholder="حداقل ۸ کاراکتر"
                />

                <button
                  type="button"
                  class="password-toggle"
                  @click="showPassword = !showPassword"
                  :aria-label="showPassword ? 'مخفی کردن رمز ورود' : 'نمایش رمز ورود'"
                >
                  <span x-text="showPassword ? 'مخفی' : 'نمایش'"></span>
                </button>

                <div id="passwordError" class="invalid-feedback" x-text="errors.password"></div>
              </div>
            </div>

            <div class="col-12 col-md-6">
              <label for="passwordConfirm" class="form-label fw-semibold">
                تکرار رمز ورود
              </label>

              <div class="position-relative">
                <input
                  x-model="form.password_confirm"
                  :class="{ 'is-invalid': errors.password_confirm }"
                  :type="showPasswordConfirm ? 'text' : 'password'"
                  class="form-control form-control-lg password-control"
                  id="passwordConfirm"
                  name="password_confirm"
                  autocomplete="new-password"
                  required
                  aria-describedby="passwordConfirmError"
                  placeholder="رمز ورود را تکرار کنید"
                />

                <button
                  type="button"
                  class="password-toggle"
                  @click="showPasswordConfirm = !showPasswordConfirm"
                  :aria-label="showPasswordConfirm ? 'مخفی کردن تکرار رمز ورود' : 'نمایش تکرار رمز ورود'"
                >
                  <span x-text="showPasswordConfirm ? 'مخفی' : 'نمایش'"></span>
                </button>

                <div id="passwordConfirmError" class="invalid-feedback" x-text="errors.password_confirm"></div>
              </div>
            </div>
          </div>

          <div class="form-check mt-4 mb-4">
            <input
              x-model="acceptedTerms"
              :class="{ 'is-invalid': errors.terms }"
              class="form-check-input"
              type="checkbox"
              id="acceptedTerms"
              required
              aria-describedby="termsError"
            />
            <label class="form-check-label" for="acceptedTerms">
              صحت اطلاعات واردشده را تأیید می‌کنم.
            </label>
            <div id="termsError" class="invalid-feedback" x-text="errors.terms"></div>
          </div>

          <button
            id="registerButton"
            type="submit"
            class="btn btn-sarasystem btn-lg w-100"
            :disabled="loading"
          >
            <span
              x-cloak
              x-show="loading"
              class="spinner-border spinner-border-sm ms-2"
              aria-hidden="true"
            ></span>

            <span x-text="loading ? 'در حال ثبت‌نام...' : 'ثبت‌نام'"></span>
          </button>
        </form>

        <div class="border-top pt-3 mt-4 text-center">
          <span class="text-secondary small">قبلاً حساب دارید؟</span>
          <a href="./login.html" class="small text-decoration-none">
            ورود به حساب کاربری
          </a>
        </div>
      </div>
    </section>
  </main>

  <script>
    function registerPage() {
      return {
        form: {
          first_name: "",
          last_name: "",
          national_id: "",
          student_id: "",
          phone: "",
          email: "",
          gender: "",
          password: "",
          password_confirm: ""
        },

        errors: {
          first_name: "",
          last_name: "",
          national_id: "",
          student_id: "",
          phone: "",
          email: "",
          gender: "",
          password: "",
          password_confirm: "",
          terms: ""
        },

        alert: {
          type: "danger",
          message: ""
        },

        loading: false,
        acceptedTerms: false,
        showPassword: false,
        showPasswordConfirm: false,

        init() {
          document.body.addEventListener("htmx:beforeRequest", (event) => {
            if (!this.isRegisterRequest(event)) return;

            this.loading = true;
            this.clearErrors();
            this.clearAlert();
          });

          document.body.addEventListener("htmx:afterRequest", (event) => {
            if (!this.isRegisterRequest(event)) return;

            this.loading = false;

            const xhr = event.detail.xhr;
            const data = this.parseJson(xhr.responseText);

            if (xhr.status >= 200 && xhr.status < 300) {
              this.handleRegisterSuccess(data);
              return;
            }

            this.handleRegisterError(xhr.status, data);
          });

          document.body.addEventListener("htmx:sendError", (event) => {
            if (!this.isRegisterRequest(event)) return;

            this.loading = false;
            this.showAlert(
              "danger",
              "ارتباط با سرور برقرار نشد. لطفاً اتصال اینترنت یا آدرس API را بررسی کنید."
            );
          });

          document.body.addEventListener("htmx:timeout", (event) => {
            if (!this.isRegisterRequest(event)) return;

            this.loading = false;
            this.showAlert(
              "danger",
              "زمان پاسخ‌گویی سرور به پایان رسید. لطفاً دوباره تلاش کنید."
            );
          });
        },

        validateBeforeSubmit(event) {
          this.clearErrors();
          this.clearAlert();

          if (!this.form.first_name) {
            this.errors.first_name = "وارد کردن نام الزامی است.";
          }

          if (!this.form.last_name) {
            this.errors.last_name = "وارد کردن نام خانوادگی الزامی است.";
          }

          if (!this.form.national_id) {
            this.errors.national_id = "وارد کردن کد ملی الزامی است.";
          } else if (!this.isDigits(this.form.national_id) || this.toEnglishDigits(this.form.national_id).length !== 10) {
            this.errors.national_id = "کد ملی باید عددی و ۱۰ رقم باشد.";
          }

          if (!this.form.student_id) {
            this.errors.student_id = "وارد کردن شماره دانشجویی الزامی است.";
          }

          if (!this.form.phone) {
            this.errors.phone = "وارد کردن شماره تماس الزامی است.";
          } else if (!this.isDigits(this.form.phone) || this.toEnglishDigits(this.form.phone).length < 10) {
            this.errors.phone = "شماره تماس باید عددی و معتبر باشد.";
          }

          if (!this.form.gender) {
            this.errors.gender = "انتخاب جنسیت الزامی است.";
          }

          if (!this.form.email) {
            this.errors.email = "وارد کردن ایمیل الزامی است.";
          } else if (!this.isValidEmail(this.form.email)) {
            this.errors.email = "فرمت ایمیل معتبر نیست.";
          }

          if (!this.form.password) {
            this.errors.password = "وارد کردن رمز ورود الزامی است.";
          } else if (this.form.password.length < 8) {
            this.errors.password = "رمز ورود باید حداقل ۸ کاراکتر باشد.";
          }

          if (!this.form.password_confirm) {
            this.errors.password_confirm = "تکرار رمز ورود الزامی است.";
          } else if (this.form.password_confirm !== this.form.password) {
            this.errors.password_confirm = "تکرار رمز ورود با رمز ورود برابر نیست.";
          }

          if (!this.acceptedTerms) {
            this.errors.terms = "برای ادامه باید صحت اطلاعات را تأیید کنید.";
          }

          if (this.hasErrors()) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        },

        handleRegisterSuccess(data) {
          this.showAlert(
            "success",
            data?.message || "ثبت‌نام با موفقیت انجام شد. در حال انتقال به صفحه ورود..."
          );

          window.setTimeout(() => {
            window.location.assign("./login.html");
          }, 1100);
        },

        handleRegisterError(status, data) {
          this.applyServerFieldErrors(data);

          const serverMessage =
            data?.detail ||
            data?.message ||
            data?.error ||
            data?.non_field_errors?.[0];

          if (serverMessage) {
            this.showAlert("danger", serverMessage);
            return;
          }

          const messages = {
            400: "اطلاعات واردشده معتبر نیست. لطفاً فیلدها را بررسی کنید.",
            401: "برای انجام این عملیات باید دوباره وارد سامانه شوید.",
            403: "شما مجوز ثبت‌نام از این مسیر را ندارید.",
            404: "آدرس API ثبت‌نام پیدا نشد.",
            409: "حسابی با این ایمیل، کد ملی یا شماره دانشجویی قبلاً ثبت شده است.",
            422: "برخی اطلاعات فرم قابل پذیرش نیست. لطفاً دوباره بررسی کنید.",
            429: "تعداد تلاش‌های ثبت‌نام زیاد است. کمی بعد دوباره تلاش کنید.",
            500: "خطای داخلی سرور رخ داده است. لطفاً بعداً دوباره تلاش کنید."
          };

          this.showAlert(
            "danger",
            messages[status] || "ثبت‌نام ناموفق بود. لطفاً دوباره تلاش کنید."
          );
        },

        applyServerFieldErrors(data) {
          const fields = [
            "first_name",
            "last_name",
            "national_id",
            "student_id",
            "phone",
            "email",
            "gender",
            "password",
            "password_confirm"
          ];

          fields.forEach((field) => {
            if (data?.[field]) {
              this.errors[field] = this.normalizeError(data[field]);
            }
          });
        },

        isRegisterRequest(event) {
          return event?.detail?.elt?.id === "registerForm";
        },

        parseJson(value) {
          try {
            return value ? JSON.parse(value) : {};
          } catch {
            return {};
          }
        },

        normalizeError(error) {
          return window.SaraUI?.normalizeError?.(error) || String(error);
        },

        toEnglishDigits(value) {
          return window.SaraUI?.toEnglishDigits?.(value) || String(value);
        },

        isDigits(value) {
          return /^\d+$/.test(this.toEnglishDigits(value));
        },

        isValidEmail(value) {
          return window.SaraValidate?.email?.(value) ?? /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
        },

        hasErrors() {
          return Object.values(this.errors).some(Boolean);
        },

        clearErrors() {
          Object.keys(this.errors).forEach((key) => {
            this.errors[key] = "";
          });
        },

        clearAlert() {
          this.alert.message = "";
        },

        showAlert(type, message) {
          this.alert.type = type;
          this.alert.message = message;
        }
      };
    }
  </script>
</body>
</html>
