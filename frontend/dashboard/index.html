<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>انتخاب داشبورد | سراسیستم</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link href="../../assets/css/sarasystem.css" rel="stylesheet" />
  <script src="../../assets/js/auth.js" defer></script>
  <script src="../../assets/js/ui-helpers.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="../../assets/js/auth-guard.js" data-login-url="../login.html" data-unauthorized-url="../403.html" defer></script>
  <style>
    [x-cloak]{display:none!important}body{min-height:100vh;font-family:"Segoe UI",Tahoma,Arial,sans-serif;color:#f8fafc;background:radial-gradient(circle at 88% 8%,rgba(56,189,248,.22),transparent 28rem),radial-gradient(circle at 7% 96%,rgba(20,184,166,.22),transparent 30rem),linear-gradient(135deg,#06162b 0%,#071b35 48%,#08254a 100%)}.shell{max-width:980px}.glass{border:1px solid rgba(255,255,255,.12);border-radius:1.7rem;background:rgba(13,39,73,.82);box-shadow:0 28px 80px rgba(0,0,0,.28);backdrop-filter:blur(18px)}.btn-ss{min-height:46px;border-radius:1rem;font-weight:900}.btn-ss-primary{border:0;color:#06162b;background:linear-gradient(135deg,#38bdf8,#67e8f9)}.btn-ss-outline{border:1px solid rgba(125,211,252,.28);color:#dff7ff;background:rgba(56,189,248,.08)}.btn-ss-outline:hover{color:#fff;background:rgba(56,189,248,.16)}.role-card{height:100%;border:1px solid rgba(255,255,255,.1);border-radius:1.25rem;background:rgba(255,255,255,.055);padding:1rem}.role-card strong{display:block}.text-muted-ss{color:#94a3b8}.icon{width:48px;height:48px;display:grid;place-items:center;border-radius:1rem;background:rgba(56,189,248,.13);font-size:1.45rem}
  </style>
</head>
<body x-data="dashboardRouter()">
  <main class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
    <section class="shell w-100 glass p-4 p-lg-5" aria-labelledby="pageTitle">
      <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-4">
        <div>
          <p class="text-info-emphasis mb-2 fw-bold">سراسیستم / داشبورد</p>
          <h1 id="pageTitle" class="h2 fw-bold mb-2">انتخاب داشبورد</h1>
          <p class="text-muted-ss mb-0" style="line-height:2">اگر نقش کاربر در پاسخ ورود مشخص نباشد، این صفحه به عنوان مسیر fallback نمایش داده می‌شود.</p>
        </div>
        <button class="btn btn-ss btn-ss-outline px-4" type="button" @click="logout()">خروج</button>
      </div>

      <div class="alert alert-info border-0 rounded-4" role="status">
        کاربر فعلی: <strong x-text="fullName()"></strong>
        <span class="mx-2">|</span>
        نقش‌های ذخیره‌شده: <span dir="ltr" x-text="rolesText()"></span>
      </div>

      <div class="row g-3">
        <template x-for="item in dashboards" :key="item.href">
          <div class="col-md-6 col-xl-3">
            <article class="role-card">
              <div class="icon mb-3" x-text="item.icon"></div>
              <strong x-text="item.title"></strong>
              <p class="text-muted-ss small mt-2" style="line-height:1.9" x-text="item.description"></p>
              <a class="btn btn-ss w-100 mt-2" :class="item.enabled ? 'btn-ss-primary' : 'btn-ss-outline disabled'" :href="item.href" x-text="item.enabled ? 'ورود به پنل' : 'غیرفعال'"></a>
            </article>
          </div>
        </template>
      </div>
    </section>
  </main>

  <script>
    function dashboardRouter(){
      return {
        user: window.SaraAuth?.getStoredUser() || {},
        dashboards: [
          {icon:'🎓', title:'دانشجو', description:'درخواست اسکان، پرداخت‌ها، تعمیرات و اطلاعیه‌ها', href:'./student.html', enabled:true},
          {icon:'🛡️', title:'مسئول خوابگاه', description:'بررسی درخواست‌ها، ظرفیت و تخصیص تخت', href:'./dormitory-admin.html', enabled:true},
          {icon:'📊', title:'مدیر سیستم', description:'صفحه پایه؛ جزئیات مدیریتی در مراحل بعد تکمیل می‌شود', href:'./admin.html', enabled:true},
          {icon:'🧰', title:'واحد پشتیبانی', description:'صفحه پایه؛ صف تعمیرات در مراحل بعد تکمیل می‌شود', href:'./support.html', enabled:true}
        ],
        fullName(){ return `${this.user.first_name || ''} ${this.user.last_name || ''}`.trim() || this.user.username || this.user.email || 'کاربر'; },
        rolesText(){ const roles = window.SaraAuth?.getUserRoles(this.user) || []; return roles.length ? roles.join(', ') : 'نامشخص'; },
        logout(){ window.SaraAuth?.clearSession(); window.location.assign('../login.html'); }
      }
    }
  </script>
</body>
</html>
