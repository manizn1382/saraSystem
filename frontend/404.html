<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صفحه پیدا نشد | سراسیستم</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <style>
    body{min-height:100vh;font-family:"Segoe UI",Tahoma,Arial,sans-serif;color:#f8fafc;background:radial-gradient(circle at 88% 8%,rgba(56,189,248,.22),transparent 28rem),radial-gradient(circle at 7% 96%,rgba(20,184,166,.22),transparent 30rem),linear-gradient(135deg,#06162b 0%,#071b35 48%,#08254a 100%)}
    .error-card{max-width:680px;border:1px solid rgba(255,255,255,.12);border-radius:1.7rem;background:rgba(13,39,73,.82);box-shadow:0 28px 80px rgba(0,0,0,.28);backdrop-filter:blur(18px)}
    .code{font-size:clamp(4rem,14vw,8rem);font-weight:950;line-height:1;color:#67e8f9;text-shadow:0 18px 40px rgba(56,189,248,.18)}
    .btn-ss{min-height:44px;border-radius:1rem;font-weight:900}.btn-ss-primary{border:0;color:#06162b;background:linear-gradient(135deg,#38bdf8,#67e8f9)}.btn-ss-outline{border:1px solid rgba(125,211,252,.28);color:#dff7ff;background:rgba(56,189,248,.08)}.btn-ss-outline:hover{color:#fff;background:rgba(56,189,248,.16)}
  </style>
</head>
<body>
  <main class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
    <section class="error-card p-4 p-md-5 text-center" aria-labelledby="pageTitle">
      <div class="code" aria-hidden="true">۴۰۴</div>
      <h1 id="pageTitle" class="h3 fw-bold mb-3">صفحه موردنظر پیدا نشد</h1>
      <p class="text-light-emphasis mb-4" style="line-height:2">آدرس واردشده در ساختار فعلی فرانت‌اند وجود ندارد یا نام فایل/مسیر تغییر کرده است.</p>
      <div class="d-flex flex-wrap justify-content-center gap-2">
        <a class="btn btn-ss btn-ss-primary px-4" href="./dashboard/index.html">داشبورد</a>
        <a class="btn btn-ss btn-ss-outline px-4" href="./index.html">صفحه اصلی</a>
        <a class="btn btn-ss btn-ss-outline px-4" href="./login.html">ورود</a>
      </div>
    </section>
  </main>
</body>
</html>
