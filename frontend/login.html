<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ورود به سراسیستم</title>

  <!-- Bootstrap RTL -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
    rel="stylesheet"
  />

  <!-- HTMX + JSON encoder extension -->
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js" defer></script>

  <!-- Alpine.js -->
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <style>
    [x-cloak] {
      display: none !important;
    }

    :root {
      --ss-primary: #08254a;
      --ss-primary-soft: #0d6efd;
      --ss-card-radius: 1.25rem;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 88% 8%, rgba(56, 189, 248, .22), transparent 28rem),
        radial-gradient(circle at 7% 96%, rgba(20, 184, 166, .22), transparent 30rem),
        radial-gradient(circle at 48% 28%, rgba(99, 102, 241, .09), transparent 26rem),
        linear-gradient(135deg, #06162b 0%, #071b35 48%, #08254a 100%);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .auth-card {
      width: 100%;
      max-width: 430px;
      border: 0;
      border-radius: var(--ss-card-radius);
      box-shadow: 0 1.25rem 3rem rgba(0, 0, 0, .28);
      background: rgba(248, 250, 252, .94);
      /* background: rgba(255, 255, 255, .96); */
      backdrop-filter: blur(10px);
    }

    .brand-logo {
      max-width: 280px;
      width: 100%;
      height: auto;
    }

    .btn-sarasystem {
      --bs-btn-bg: var(--ss-primary);
      --bs-btn-border-color: var(--ss-primary);
      --bs-btn-hover-bg: #0b3569;
      --bs-btn-hover-border-color: #0b3569;
      --bs-btn-active-bg: #061b36;
      --bs-btn-active-border-color: #061b36;
      --bs-btn-color: #fff;
      --bs-btn-hover-color: #fff;
      --bs-btn-active-color: #fff;
    }

    .form-control:focus {
      border-color: var(--ss-primary-soft);
      box-shadow: 0 0 0 .25rem rgba(13, 110, 253, .15);
    }

    .password-control {
    padding-left: 4.75rem;
    }

    .password-toggle {
    position: absolute;
    top: 50%;
    left: .65rem;
    transform: translateY(-50%);
    z-index: 5;
    border: 0;
    border-radius: 999px;
    background: #eef3f8;
    color: #475569;
    font-size: .85rem;
    font-weight: 600;
    line-height: 1;
    padding: .45rem .75rem;
    transition: background-color .2s ease, color .2s ease, box-shadow .2s ease;
    }

    .password-toggle:hover {
    background: #dbeafe;
    color: #0d6efd;
    }

    .password-toggle:focus-visible {
    outline: 0;
    box-shadow: 0 0 0 .2rem rgba(13, 110, 253, .2);
    }

    .password-control.is-invalid {
    background-position: left calc(4.75rem + .1875rem) center;
    }

    .home-back-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .45rem;
    min-height: 38px;
    padding: .45rem .95rem;
    border: 1px solid rgba(125, 211, 252, .28);
    border-radius: 999px;
    background: rgba(255, 255, 255, .08);
    color: #dff7ff;
    font-size: .875rem;
    font-weight: 700;
    text-decoration: none;
    backdrop-filter: blur(12px);
    transition: transform .2s ease, background-color .2s ease, color .2s ease, border-color .2s ease;
    }

    .home-back-btn:hover {
    color: #fff;
    background: rgba(56, 189, 248, .16);
    border-color: rgba(125, 211, 252, .42);
    transform: translateY(-1px);
    }

    .home-back-btn:focus-visible {
    outline: 0;
    box-shadow: 0 0 0 .2rem rgba(56, 189, 248, .24);
    }

  </style>
</head>

<body x-data="loginPage()">
  <main class="container min-vh-100 d-flex flex-column align-items-center justify-content-center gap-3 py-4">
      <a href="./index.html" class="home-back-btn" aria-label="بازگشت به صفحه اصلی سراسیستم">
    <span aria-hidden="true">⌂</span>
    <span>بازگشت به صفحه اصلی</span>
  </a>
    <section class="card auth-card" aria-labelledby="loginTitle">
      <div class="card-body p-4 p-md-5">
        <header class="text-center mb-4">
          <img
            src="../assets/logo_with_outline.png"
            alt="نشان سراسیستم"
            class="brand-logo mb-3"
            onerror="this.classList.add('d-none')"
          />

          <h1 id="loginTitle" class="h4 fw-bold text-primary-emphasis mb-2">
            ورود به سراسیستم
          </h1>

          <p class="text-secondary mb-0">
            سامانه مدیریت خوابگاه‌های دانشجویی
          </p>
        </header>

        <div
          x-cloak
          x-show="alert.message"
          x-transition
          class="alert mb-4"
          :class="alert.type === 'success' ? 'alert-success' : 'alert-danger'"
          role="alert"
          aria-live="polite"
        >
          <span x-text="alert.message"></span>
        </div>

        <form
          id="loginForm"
          novalidate
          hx-ext="json-enc"
          hx-post="/api/auth/login/"
          hx-trigger="submit"
          hx-swap="none"
          hx-timeout="15000"
          hx-headers='{"Accept": "application/json"}'
          @submit.capture="validateBeforeSubmit($event)"
        >
        <div class="mb-3">
        <label for="username" class="form-label fw-semibold">
            شناسه کاربری
        </label>

        <input
            x-model.trim="form.username"
            :class="{ 'is-invalid': errors.username }"
            type="text"
            class="form-control form-control-lg"
            id="username"
            name="username"
            autocomplete="username"
            inputmode="email"
            required
            aria-describedby="usernameError"
            placeholder="ایمیل، شماره دانشجویی یا نام کاربری"
        />

        <div id="usernameError" class="invalid-feedback" x-text="errors.username"></div>
        </div>

        <div class="mb-3">
        <label for="password" class="form-label fw-semibold">
            رمز ورود
        </label>

        <div class="position-relative">
            <input
            x-model="form.password"
            :class="{ 'is-invalid': errors.password }"
            :type="showPassword ? 'text' : 'password'"
            class="form-control form-control-lg password-control"
            id="password"
            name="password"
            autocomplete="current-password"
            required
            aria-describedby="passwordError"
            placeholder="رمز ورود خود را وارد کنید"
            />

            <button
            type="button"
            class="password-toggle"
            @click="showPassword = !showPassword"
            :aria-label="showPassword ? 'مخفی کردن رمز ورود' : 'نمایش رمز ورود'"
            >
            <span x-text="showPassword ? 'مخفی' : 'نمایش'"></span>
            </button>

            <div id="passwordError" class="invalid-feedback" x-text="errors.password"></div>
        </div>
        </div>

          <div class="d-flex align-items-center justify-content-between gap-3 mb-4">
            <div class="form-check">
              <input
                x-model="remember"
                class="form-check-input"
                type="checkbox"
                id="rememberMe"
              />
              <label class="form-check-label" for="rememberMe">
                مرا به خاطر بسپار
              </label>
            </div>

            <a href="/forgot-password.html" class="link-primary text-decoration-none small">
              فراموشی رمز ورود
            </a>
          </div>

          <button
            id="loginButton"
            type="submit"
            class="btn btn-sarasystem btn-lg w-100"
            :disabled="loading"
          >
            <span
              x-cloak
              x-show="loading"
              class="spinner-border spinner-border-sm ms-2"
              aria-hidden="true"
            ></span>

            <span x-text="loading ? 'در حال ورود...' : 'ورود'"></span>
          </button>
        </form>

        <div class="border-top pt-3 mt-4 text-center">
          <span class="text-secondary small">حساب دانشجویی ندارید؟</span>
          <a href="./register.html" class="small text-decoration-none">
            ثبت‌نام دانشجو
          </a>
        </div>
      </div>
    </section>
  </main>

  <script>
    function loginPage() {
      return {
        form: {
          username: "",
          password: ""
        },

        errors: {
          username: "",
          password: ""
        },

        alert: {
          type: "danger",
          message: ""
        },

        loading: false,
        remember: false,
        showPassword: false,

        init() {
          document.body.addEventListener("htmx:beforeRequest", (event) => {
            if (!this.isLoginRequest(event)) return;

            this.loading = true;
            this.clearErrors();
            this.clearAlert();
          });

          document.body.addEventListener("htmx:afterRequest", (event) => {
            if (!this.isLoginRequest(event)) return;

            this.loading = false;

            const xhr = event.detail.xhr;
            const data = this.parseJson(xhr.responseText);

            if (xhr.status >= 200 && xhr.status < 300) {
              this.handleLoginSuccess(data);
              return;
            }

            this.handleLoginError(xhr.status, data);
          });

          document.body.addEventListener("htmx:sendError", (event) => {
            if (!this.isLoginRequest(event)) return;

            this.loading = false;
            this.showAlert(
              "danger",
              "ارتباط با سرور برقرار نشد. لطفاً اتصال اینترنت یا آدرس API را بررسی کنید."
            );
          });

          document.body.addEventListener("htmx:timeout", (event) => {
            if (!this.isLoginRequest(event)) return;

            this.loading = false;
            this.showAlert(
              "danger",
              "زمان پاسخ‌گویی سرور به پایان رسید. لطفاً دوباره تلاش کنید."
            );
          });
        },

        validateBeforeSubmit(event) {
          this.clearErrors();
          this.clearAlert();

          if (!this.form.username) {
            this.errors.username = "وارد کردن شناسه کاربری الزامی است.";
          }

          if (!this.form.password) {
            this.errors.password = "وارد کردن رمز ورود الزامی است.";
          }

          if (this.errors.username || this.errors.password) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        },

        handleLoginSuccess(data) {
          const accessToken =
            data?.access ||
            data?.access_token ||
            data?.token ||
            data?.tokens?.access;

          const refreshToken =
            data?.refresh ||
            data?.refresh_token ||
            data?.tokens?.refresh;

          if (!accessToken) {
            this.showAlert(
              "danger",
              "ورود انجام شد، اما پاسخ سرور شامل توکن معتبر نیست."
            );
            return;
          }

          const storage = this.remember ? localStorage : sessionStorage;

          storage.setItem("sarasystem.accessToken", accessToken);

          if (refreshToken) {
            storage.setItem("sarasystem.refreshToken", refreshToken);
          }

          if (data?.user) {
            storage.setItem("sarasystem.user", JSON.stringify(data.user));
          }

          this.showAlert("success", "ورود موفق بود. در حال انتقال به داشبورد...");

          window.setTimeout(() => {
            window.location.assign(this.getDashboardPath(data?.user));
          }, 700);
        },

        handleLoginError(status, data) {
          this.applyServerFieldErrors(data);

          const serverMessage =
            data?.detail ||
            data?.message ||
            data?.error ||
            data?.non_field_errors?.[0];

          if (serverMessage) {
            this.showAlert("danger", serverMessage);
            return;
          }

          const messages = {
            400: "اطلاعات واردشده معتبر نیست. لطفاً فیلدها را بررسی کنید.",
            401: "شناسه کاربری یا رمز ورود اشتباه است.",
            403: "حساب شما مجوز ورود به این بخش را ندارد یا غیرفعال شده است.",
            404: "آدرس API ورود پیدا نشد.",
            429: "تعداد تلاش‌های ورود زیاد است. کمی بعد دوباره تلاش کنید.",
            500: "خطای داخلی سرور رخ داده است. لطفاً بعداً دوباره تلاش کنید."
          };

          this.showAlert(
            "danger",
            messages[status] || "ورود ناموفق بود. لطفاً دوباره تلاش کنید."
          );
        },

        applyServerFieldErrors(data) {
          const usernameError =
            data?.username ||
            data?.email ||
            data?.student_id ||
            data?.national_id;

          const passwordError = data?.password;

          if (usernameError) {
            this.errors.username = this.normalizeError(usernameError);
          }

          if (passwordError) {
            this.errors.password = this.normalizeError(passwordError);
          }
        },

        getDashboardPath(user) {
          const roles = Array.isArray(user?.roles)
            ? user.roles
            : user?.role
              ? [user.role]
              : [];

          const normalizedRoles = roles.map((role) => {
            const value =
              typeof role === "string"
                ? role
                : role?.code || role?.name || "";

            return value.toLowerCase().trim().replace(/\s+/g, "_");
          });

          if (normalizedRoles.includes("student") || normalizedRoles.includes("resident")) {
            return "/dashboard/student.html";
          }

          if (normalizedRoles.includes("dormitory_admin")) {
            return "/dashboard/dormitory-admin.html";
          }

          if (
            normalizedRoles.includes("system_admin") ||
            normalizedRoles.includes("admin") ||
            normalizedRoles.includes("university_manager")
          ) {
            return "/dashboard/admin.html";
          }

          if (normalizedRoles.includes("support_staff")) {
            return "/dashboard/support.html";
          }

          return "/dashboard/index.html";
        },

        isLoginRequest(event) {
          return event?.detail?.elt?.id === "loginForm";
        },

        parseJson(value) {
          try {
            return value ? JSON.parse(value) : {};
          } catch {
            return {};
          }
        },

        normalizeError(error) {
          return Array.isArray(error) ? error.join("، ") : String(error);
        },

        clearErrors() {
          this.errors.username = "";
          this.errors.password = "";
        },

        clearAlert() {
          this.alert.message = "";
        },

        showAlert(type, message) {
          this.alert.type = type;
          this.alert.message = message;
        }
      };
    }
  </script>
</body>
</html>
