<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فراموشی رمز ورود | سراسیستم</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
    />
    <script src="../assets/js/theme.js"></script>
    <link href="../assets/css/sarasystem.css" rel="stylesheet" />
    <link href="../assets/css/theme.css" rel="stylesheet" />
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    <script
      src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"
      defer
    ></script>
    <script src="../assets/js/ui-helpers.js" defer></script>
    <script src="../assets/js/auth.js" defer></script>
    <script src="../assets/js/api.js" defer></script>
    <script src="../assets/js/page-helpers.js" defer></script>
    <script src="../assets/js/auth-pages.js" defer></script>
    <script
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
      defer
    ></script>
  </head>
  <body class="ss-auth-page" x-data="forgotPasswordPage()">
    <main
      class="container min-vh-100 d-flex flex-column align-items-center justify-content-center gap-3 py-4"
    >
      <a
        href="./login.html"
        class="ss-home-back"
        aria-label="بازگشت به صفحه ورود"
        >← بازگشت به ورود</a
      >

      <section class="card ss-auth-card-light" aria-labelledby="forgotTitle">
        <div class="card-body p-4 p-md-5">
          <header class="text-center mb-4">
            <img
              src="../assets/logo_with_outline.png"
              alt="نشان سراسیستم"
              class="ss-brand-logo mb-3"
              onerror="this.classList.add('d-none')"
            />
            <h1 id="forgotTitle" class="h4 fw-bold text-primary-emphasis mb-2">
              بازیابی رمز ورود
            </h1>
            <p class="text-secondary mb-0" style="line-height: 1.9">
              در این نسخه، رمز عبور فقط با وارد کردن نام کاربری تغییر می‌کند.
            </p>
          </header>

          <div
            x-cloak
            x-show="alert.message"
            x-transition
            class="alert mb-4"
            :class="alert.type === 'success' ? 'alert-success' : 'alert-danger'"
            role="alert"
            aria-live="polite"
          >
            <span x-text="alert.message"></span>
          </div>

          <form
            id="forgotPasswordForm"
            novalidate
            @submit.prevent="submitUsernameReset()"
          >
            <div class="mb-3">
              <label for="username" class="form-label fw-semibold"
                >نام کاربری</label
              >
              <input
                x-model.trim="form.username"
                :class="{ 'is-invalid': errors.username }"
                type="text"
                class="form-control form-control-lg"
                id="username"
                name="username"
                autocomplete="username"
                required
                aria-describedby="usernameError"
                placeholder="student001"
                dir="ltr"
              />
              <div
                id="usernameError"
                class="invalid-feedback"
                x-text="errors.username"
              ></div>
            </div>

            <div class="mb-3">
              <label for="newPassword" class="form-label fw-semibold"
                >رمز عبور جدید</label
              >
              <input
                x-model="form.new_password"
                :class="{ 'is-invalid': errors.new_password }"
                type="password"
                class="form-control form-control-lg"
                id="newPassword"
                name="new_password"
                autocomplete="new-password"
                required
                aria-describedby="newPasswordError"
                placeholder="رمز جدید را وارد کنید"
              />
              <div
                id="newPasswordError"
                class="invalid-feedback"
                x-text="errors.new_password"
              ></div>
            </div>

            <div class="mb-4">
              <label for="confirmPassword" class="form-label fw-semibold"
                >تکرار رمز عبور جدید</label
              >
              <input
                x-model="form.confirm_password"
                :class="{ 'is-invalid': errors.confirm_password }"
                type="password"
                class="form-control form-control-lg"
                id="confirmPassword"
                name="confirm_password"
                autocomplete="new-password"
                required
                aria-describedby="confirmPasswordError"
                placeholder="رمز جدید را دوباره وارد کنید"
              />
              <div
                id="confirmPasswordError"
                class="invalid-feedback"
                x-text="errors.confirm_password"
              ></div>
            </div>

            <button
              id="forgotButton"
              type="submit"
              class="btn ss-btn-dark-primary btn-lg w-100"
              :disabled="loading"
            >
              <span
                x-cloak
                x-show="loading"
                class="spinner-border spinner-border-sm ms-2"
                aria-hidden="true"
              ></span>
              <span
                x-text="loading ? 'در حال تغییر رمز...' : 'تغییر رمز عبور'"
              ></span>
            </button>
          </form>

          <p
            class="small text-secondary mt-4 mb-0 text-center"
            style="line-height: 1.9"
          >
            این مسیر فقط برای نسخه فعلی سامانه است و جایگزین بازیابی امن با ایمیل یا پیامک نیست.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
