<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فراموشی رمز ورود | سراسیستم</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    [x-cloak]{display:none!important}:root{--ss-primary:#08254a;--ss-primary-soft:#0d6efd;--ss-card-radius:1.25rem}body{min-height:100vh;background:radial-gradient(circle at 88% 8%,rgba(56,189,248,.22),transparent 28rem),radial-gradient(circle at 7% 96%,rgba(20,184,166,.22),transparent 30rem),radial-gradient(circle at 48% 28%,rgba(99,102,241,.09),transparent 26rem),linear-gradient(135deg,#06162b 0%,#071b35 48%,#08254a 100%);font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif}.auth-card{width:100%;max-width:480px;border:0;border-radius:var(--ss-card-radius);box-shadow:0 1.25rem 3rem rgba(0,0,0,.28);background:rgba(248,250,252,.94);backdrop-filter:blur(10px)}.brand-logo{max-width:220px;width:100%;height:auto}.btn-sarasystem{--bs-btn-bg:var(--ss-primary);--bs-btn-border-color:var(--ss-primary);--bs-btn-hover-bg:#0b3569;--bs-btn-hover-border-color:#0b3569;--bs-btn-active-bg:#061b36;--bs-btn-active-border-color:#061b36;--bs-btn-color:#fff;--bs-btn-hover-color:#fff;--bs-btn-active-color:#fff}.form-control:focus{border-color:var(--ss-primary-soft);box-shadow:0 0 0 .25rem rgba(13,110,253,.15)}.home-back-btn{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;min-height:38px;padding:.45rem .95rem;border:1px solid rgba(125,211,252,.28);border-radius:999px;background:rgba(255,255,255,.08);color:#dff7ff;font-size:.875rem;font-weight:700;text-decoration:none;backdrop-filter:blur(12px)}.home-back-btn:hover{color:#fff;background:rgba(56,189,248,.16)}
  </style>
</head>
<body x-data="forgotPasswordPage()">
  <main class="container min-vh-100 d-flex flex-column align-items-center justify-content-center gap-3 py-4">
    <a href="./login.html" class="home-back-btn" aria-label="بازگشت به صفحه ورود">← بازگشت به ورود</a>

    <section class="card auth-card" aria-labelledby="forgotTitle">
      <div class="card-body p-4 p-md-5">
        <header class="text-center mb-4">
          <img src="../assets/logo_with_outline.png" alt="نشان سراسیستم" class="brand-logo mb-3" onerror="this.classList.add('d-none')" />
          <h1 id="forgotTitle" class="h4 fw-bold text-primary-emphasis mb-2">بازیابی رمز ورود</h1>
          <p class="text-secondary mb-0" style="line-height:1.9">شناسه کاربری یا ایمیل خود را وارد کنید تا درخواست بازیابی برای API ارسال شود.</p>
        </header>

        <div x-cloak x-show="alert.message" x-transition class="alert mb-4" :class="alert.type === 'success' ? 'alert-success' : 'alert-danger'" role="alert" aria-live="polite">
          <span x-text="alert.message"></span>
        </div>

        <form id="forgotPasswordForm" novalidate hx-ext="json-enc" hx-post="/api/auth/forgot-password/" hx-trigger="submit" hx-swap="none" hx-timeout="15000" hx-headers='{"Accept":"application/json"}' @submit.capture="validateBeforeSubmit($event)">
          <div class="mb-4">
            <label for="identifier" class="form-label fw-semibold">ایمیل یا شناسه کاربری</label>
            <input x-model.trim="identifier" :class="{ 'is-invalid': error }" type="text" class="form-control form-control-lg" id="identifier" name="identifier" autocomplete="username" required aria-describedby="identifierError" placeholder="example@university.ac.ir یا شماره دانشجویی" />
            <div id="identifierError" class="invalid-feedback" x-text="error"></div>
          </div>

          <button id="forgotButton" type="submit" class="btn btn-sarasystem btn-lg w-100" :disabled="loading">
            <span x-cloak x-show="loading" class="spinner-border spinner-border-sm ms-2" aria-hidden="true"></span>
            <span x-text="loading ? 'در حال ارسال...' : 'ارسال درخواست بازیابی'"></span>
          </button>
        </form>

        <p class="small text-secondary mt-4 mb-0 text-center" style="line-height:1.9">این صفحه فقط رابط فرانت‌اند است؛ ارسال ایمیل/پیامک بازیابی باید توسط API انجام شود.</p>
      </div>
    </section>
  </main>

  <script>
    function forgotPasswordPage() {
      return {
        identifier: '',
        error: '',
        loading: false,
        alert: { type: 'danger', message: '' },

        init() {
          document.body.addEventListener('htmx:beforeRequest', (event) => {
            if (!this.isForgotRequest(event)) return;
            this.loading = true;
            this.error = '';
            this.alert.message = '';
          });

          document.body.addEventListener('htmx:afterRequest', (event) => {
            if (!this.isForgotRequest(event)) return;
            this.loading = false;
            const xhr = event.detail.xhr;
            const data = this.parseJson(xhr.responseText);

            if (xhr.status >= 200 && xhr.status < 300) {
              this.alert = { type: 'success', message: data?.message || 'درخواست بازیابی ثبت شد. در صورت معتبر بودن اطلاعات، راهنمای ادامه ارسال می‌شود.' };
              return;
            }

            this.error = this.normalizeError(data?.identifier || data?.email || data?.username || '');
            this.alert = { type: 'danger', message: data?.detail || data?.message || this.statusMessage(xhr.status) };
          });

          document.body.addEventListener('htmx:sendError', (event) => {
            if (!this.isForgotRequest(event)) return;
            this.loading = false;
            this.alert = { type: 'danger', message: 'ارتباط با سرور برقرار نشد. آدرس API یا اتصال شبکه را بررسی کنید.' };
          });

          document.body.addEventListener('htmx:timeout', (event) => {
            if (!this.isForgotRequest(event)) return;
            this.loading = false;
            this.alert = { type: 'danger', message: 'زمان پاسخ‌گویی سرور به پایان رسید. دوباره تلاش کنید.' };
          });
        },

        validateBeforeSubmit(event) {
          this.error = '';
          this.alert.message = '';

          if (!this.identifier) {
            this.error = 'وارد کردن ایمیل یا شناسه کاربری الزامی است.';
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        },

        isForgotRequest(event) { return event?.detail?.elt?.id === 'forgotPasswordForm'; },
        parseJson(value) { try { return value ? JSON.parse(value) : {}; } catch { return {}; } },
        normalizeError(error) { return Array.isArray(error) ? error.join('، ') : String(error || ''); },
        statusMessage(status) {
          return ({400:'اطلاعات واردشده معتبر نیست.',404:'آدرس API بازیابی رمز پیدا نشد.',429:'تعداد درخواست‌ها زیاد است. کمی بعد دوباره تلاش کنید.',500:'خطای داخلی سرور رخ داده است.'}[status] || 'ثبت درخواست بازیابی ناموفق بود.');
        }
      };
    }
  </script>
</body>
</html>
