<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فراموشی رمز ورود | سراسیستم</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
    />
    <script src="../assets/js/theme.js"></script>
    <link href="../assets/css/sarasystem.css" rel="stylesheet" />
    <link href="../assets/css/theme.css" rel="stylesheet" />
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    <script
      src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"
      defer
    ></script>
    <script src="../assets/js/ui-helpers.js" defer></script>
    <script src="../assets/js/page-helpers.js" defer></script>
    <script src="../assets/js/auth-pages.js" defer></script>
    <script
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
      defer
    ></script>
  </head>
  <body class="ss-auth-page" x-data="forgotPasswordPage()">
    <main
      class="container min-vh-100 d-flex flex-column align-items-center justify-content-center gap-3 py-4"
    >
      <a
        href="./login.html"
        class="ss-home-back"
        aria-label="بازگشت به صفحه ورود"
        >← بازگشت به ورود</a
      >

      <section class="card ss-auth-card-light" aria-labelledby="forgotTitle">
        <div class="card-body p-4 p-md-5">
          <header class="text-center mb-4">
            <img
              src="../assets/logo_with_outline.png"
              alt="نشان سراسیستم"
              class="ss-brand-logo mb-3"
              onerror="this.classList.add('d-none')"
            />
            <h1 id="forgotTitle" class="h4 fw-bold text-primary-emphasis mb-2">
              بازیابی رمز ورود
            </h1>
            <p class="text-secondary mb-0" style="line-height: 1.9">
              شناسه کاربری یا ایمیل خود را وارد کنید تا درخواست بازیابی برای API
              ارسال شود.
            </p>
          </header>

          <div
            x-cloak
            x-show="alert.message"
            x-transition
            class="alert mb-4"
            :class="alert.type === 'success' ? 'alert-success' : 'alert-danger'"
            role="alert"
            aria-live="polite"
          >
            <span x-text="alert.message"></span>
          </div>

          <form
            id="forgotPasswordForm"
            novalidate
            hx-ext="json-enc"
            hx-post="/api/auth/forgot-password/"
            hx-trigger="submit"
            hx-swap="none"
            hx-timeout="15000"
            hx-headers='{"Accept":"application/json"}'
            @submit.capture="validateBeforeSubmit($event)"
          >
            <div class="mb-4">
              <label for="identifier" class="form-label fw-semibold"
                >ایمیل یا شناسه کاربری</label
              >
              <input
                x-model.trim="identifier"
                :class="{ 'is-invalid': error }"
                type="text"
                class="form-control form-control-lg"
                id="identifier"
                name="identifier"
                autocomplete="username"
                required
                aria-describedby="identifierError"
                placeholder="example@university.ac.ir یا شماره دانشجویی"
              />
              <div
                id="identifierError"
                class="invalid-feedback"
                x-text="error"
              ></div>
            </div>

            <button
              id="forgotButton"
              type="submit"
              class="btn ss-btn-dark-primary btn-lg w-100"
              :disabled="loading"
            >
              <span
                x-cloak
                x-show="loading"
                class="spinner-border spinner-border-sm ms-2"
                aria-hidden="true"
              ></span>
              <span
                x-text="loading ? 'در حال ارسال...' : 'ارسال درخواست بازیابی'"
              ></span>
            </button>
          </form>

          <p
            class="small text-secondary mt-4 mb-0 text-center"
            style="line-height: 1.9"
          >
            این صفحه فقط رابط فرانت‌اند است؛ ارسال ایمیل/پیامک بازیابی باید توسط
            API انجام شود.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
